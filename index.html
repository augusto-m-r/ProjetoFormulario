<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1>Venda seu carro</h1>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre o seu carro para vender mais rápido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Formulário</p>
            </div>
            <div class="form-body">
                <h1 class="titulo-form">Venda fácil seu carro</h1>
                <p>Decreva as características do seu carro e marque os opcionais que ele possui.</p>
                <form onsubmit="salvarCarro(event)">
                    <div class="caixaInputs">
                        <label for="title">Título do anúncio <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="title" id="title" class="block"
                            placeholder="Digite um título para o anúncio">
                    </div>
                    <div class="caixaInputs">
                        <label for="preco">Preco <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="preco" id="preco" class="block" placeholder="Digite o seu preço">
                    </div>
                    <div class="caixaInputs">
                        <label for="descricao">Descrição <span class="campo-obrigatorio">*</span></label>
                        <textarea name="descricao" id="descricao" class="block"
                            placeholder="Digite a descrição do seu veículo"></textarea>
                    </div>
                    <div class="caixaInputs">
                        <label for="marca">Marca do carro <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="marca" id="marca" class="block" placeholder="Digite a marca">
                    </div>
                    <div class="caixaInputs">
                        <label for="modelo">Modelo do carro <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="modelo" id="modelo" class="block" placeholder="Digite o modelo">
                    </div>
                    <div class="caixaInputs">
                        <label for="kilometragem">Kilometragem <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="kilometragem" id="kilometragem" class="block"
                            placeholder="Digite a kilometragem">
                    </div>
                    <div class="caixaInputs">
                        <label for="data-compra">Data de compra <span class="campo-obrigatorio">*</span></label>
                        <input type="date" name="data-compra" id="data-compra" class="block">
                    </div>
                    <div class="caixaInputs">
                        <p>Tipo de câmbio: <span class="campo-obrigatorio">*</span></p>
                        <input type="radio" name="marcha" id="manual">
                        <label for="manual">Manual</label>
                        <input type="radio" name="marcha" id="automatico">
                        <label for="automatico">Automático</label>
                    </div>
                    <div class="caixaOpcional">
                        <p>Opcional</p>
                        <ul class="listaOpcionais">
                            <li>
                                <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                                <label for="airbag">Airbag</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                                <label for="alarme">Alarme</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="arCondicionado" value="arCondicionado">
                                <label for="arCondicionado">Ar Condicionado</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="cameraDeRe" value="cameraDeRe">
                                <label for="cameraDeRe">Câmera de ré</label>
                            </li>
                        </ul>
                    </div>
                    <div class="caixaOpcional">
                        <ul class="listaOpcionais">
                            <li>
                                <input type="checkbox" name="opcional[]" id="assistenteDePista"
                                    value="assistenteDePista">
                                <label for="assistenteDePista">Assistente de pista</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="partidaSemChave" value="partidaSemChave">
                                <label for="partidaSemChave">Partida sem chave</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="integracaoComCelular"
                                    value="integracaoComCelular">
                                <label for="integracaoComCelular">Integração com celular</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="bancoDeCouro" value="bancoDeCouro">
                                <label for="bancoDeCouro">Banco de couro</label>
                            </li>
                        </ul>
                    </div>
                    <div class="caixaInputs">
                        <p>Fotos do carro <span class="campo-obrigatorio">*</span></p> <input type="file" name="images"
                            id="images" multiple accept="image/png, image/jpg">
                    </div>
                    <input type="submit" value="Enviar" class="btn-submit">
                </form>
                <hr>
                <h2>Carros Cadastrados</h2>
                <div id="listaCarros"></div>
        </div>
        <script src="script.js"></script>
</body>

</html>
